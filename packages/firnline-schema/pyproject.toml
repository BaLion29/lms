[project]
name = "firnline-schema"
version = "0.1.0a1"
description = "Schema toolchain CLI: compose, diff, apply, codegen"
authors = [
    { name = "BaLion29", email = "bastien.aeby@familyaeby.ch" }
]
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "firnline-core",
]

[tool.uv.sources]
firnline-core = { workspace = true }

[project.scripts]
firnline-schema = "firnline_schema.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firnline_schema"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "respx",
    "ruff",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: integration tests that require a running dev instance",
]
