name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without 'v' prefix)"
        required: true
        type: string

env:
  NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
  PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: firnline-schema
            dockerfile: packages/firnline-schema/Dockerfile
          - name: apid
            dockerfile: services/apid/Dockerfile
          - name: ingestd
            dockerfile: services/ingestd/Dockerfile
          - name: triggerd
            dockerfile: services/triggerd/Dockerfile
          - name: effectd
            dockerfile: services/effectd/Dockerfile
          - name: webui
            dockerfile: services/webui/Dockerfile

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Validate Docker Hub secrets ───────────────────────────────
      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_NAMESPACE }}" ]; then
            echo "::error::DOCKERHUB_NAMESPACE secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::DOCKERHUB_USERNAME secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::DOCKERHUB_TOKEN secret is not set."
            exit 1
          fi
          echo "Publishing to namespace: ${{ secrets.DOCKERHUB_NAMESPACE }}"

      # ── 4. Extract version ────────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      # ── 5. Set up QEMU (multi-arch) ───────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 6. Set up Docker Buildx ───────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 7. Login to Docker Hub ────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Build and push ─────────────────────────────────────────────
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.NAMESPACE }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.NAMESPACE }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 9. Summary ────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Docker Publish — ${{ matrix.name }}"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${{ env.NAMESPACE }}/${{ matrix.name }}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| Platforms | \`${{ env.PLATFORMS }}\` |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
