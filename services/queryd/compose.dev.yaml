# ---------------------------------------------------------------------------
# Development compose file — starts TerminusDB for local development.
#
# Usage:
#   docker compose -f compose.dev.yaml up -d          # TerminusDB only
#   docker compose -f compose.dev.yaml --profile app up -d  # + queryd
#
# LiteLLM is assumed to run externally (e.g. on the host or another compose).
# ---------------------------------------------------------------------------

services:
  terminusdb:
    image: terminusdb/terminusdb-server:v12.0.6
    # Verified: tag v12.0.6 present on Docker Hub (2026-07-05).
    environment:
      # TerminusDB admin password (mandatory; upstream env var name from
      # https://raw.githubusercontent.com/terminusdb/terminusdb/main/README.md)
      TERMINUSDB_ADMIN_PASS: root
    volumes:
      - terminusdb_data:/app/terminusdb/storage
    ports:
      - "6363:6363"

  # queryd service — optional, built from the local Dockerfile, behind a
  # profile so that plain `docker compose up` only starts the database.
  queryd:
    profiles:
      - app
    build:
      context: ../..
      dockerfile: services/queryd/Dockerfile
    environment:
      # TerminusDB connection (pointing at the compose service)
      QUERYD_TDB_URL: http://terminusdb:6363
      QUERYD_TDB_DB: queryd_dev
      QUERYD_TDB_PASSWORD: root
      QUERYD_TDB_USER: admin
      # API auth
      QUERYD_API_TOKEN: dev-token
      # LLM — fill in real values for your LiteLLM gateway (external)
      QUERYD_LLM_BASE_URL: http://host.docker.internal:4000
      QUERYD_LLM_API_KEY: ""
      QUERYD_LLM_MODEL: ""
      # Operational
      QUERYD_ENABLE_WRITES: "false"
    ports:
      - "8087:8087"
    depends_on:
      - terminusdb
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  terminusdb_data:
