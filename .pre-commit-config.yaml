repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: [check]
      - id: ruff-format

  - repo: local
    hooks:
      - id: conflict-markers
        name: check for merge conflict markers
        entry: bash -c '! git ls-files -z | xargs -0 grep -Plz "^(<<<<<<< |=======$|>>>>>>> )"'
        language: system
        types: [text]
        stages: [pre-commit]
