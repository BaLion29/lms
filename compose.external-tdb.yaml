# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# External TerminusDB overlay — pass alongside compose.yaml.
#
# Usage:
#   docker compose -f compose.yaml -f compose.external-tdb.yaml up -d
#   docker compose -f compose.yaml -f compose.external-tdb.yaml --profile bootstrap run --rm bootstrap
#
# Requires Docker Compose >= v2.24 for !reset tag support.
#
# Quickstart:
#   1. cp .env.example .env && vim .env     # set TDB_URL + all secrets
#   2. docker compose -f compose.yaml -f compose.external-tdb.yaml \
#        --profile bootstrap up bootstrap --abort-on-container-exit
#   3. docker compose -f compose.yaml -f compose.external-tdb.yaml up -d
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

services:
  # Disable the bundled TerminusDB service (cannot truly remove from overlay).
  # !override replaces the base profiles list rather than merging (requires ≥ v2.24).
  terminusdb:
    profiles: !override ["disabled"]

  # ── Bootstrap (redefined command — no containerised terminusdb) ────────
  bootstrap:
    depends_on: !reset []
    environment:
      TDB_URL: ${TDB_URL:?err TDB_URL must be set for external TerminusDB}
      TDB_ORG: ${TDB_ORG:-admin}
      TDB_DB: ${TDB_DB:-lms}
      TDB_USER: ${TDB_USER:-admin}
      TDB_BRANCH: ${TDB_BRANCH:-main}
      LMS_SCHEMA_TDB_PASSWORD: ${TDB_PASSWORD:?}
    # List form so compose passes argv directly (no parser shell-tokenization).
    # $$ escaping prevents compose from interpolating secrets into the command.
    command:
      - sh
      - -euc
      - |
        set -eu
        echo "=== Ensure database exists ==="
        python << "PYEOF"
        import asyncio, sys
        from lms_core.tdb import TdbClient
        async def main():
            async with TdbClient(
                base_url="$${TDB_URL}",
                org="$${TDB_ORG:-admin}",
                db="$${TDB_DB:-lms}",
                user="$${TDB_USER:-admin}",
                password="$${LMS_SCHEMA_TDB_PASSWORD}",
            ) as c:
                if await c.db_exists():
                    print("Database already exists.")
                else:
                    await c.create_db()
                    print("Database created.")
        asyncio.run(main())
        PYEOF
        echo "=== Compose schema ==="
        lms-schema compose --modules-dir /work/schema/modules --out-dir /work/build
        echo "=== Apply schema ==="
        lms-schema apply --modules-dir /work/schema/modules \
          --tdb-url $${TDB_URL} \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-lms} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Validate ==="
        lms-schema validate --modules-dir /work/schema/modules \
          --tdb-url $${TDB_URL} \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-lms} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Bootstrap complete ==="

  # ── captured (external TDB endpoint) ──────────────────────────────────
  captured:
    depends_on: !reset []
    environment:
      CAPTURED_TDB_URL: ${TDB_URL:?err TDB_URL must be set for external TerminusDB}

  # ── ingestd (external TDB endpoint) ────────────────────────────────────
  ingestd:
    depends_on: !reset []
    environment:
      INGESTD_TDB_URL: ${TDB_URL:?err TDB_URL must be set for external TerminusDB}

  # ── queryd (external TDB endpoint) ────────────────────────────────────
  queryd:
    depends_on: !reset []
    environment:
      QUERYD_TDB_URL: ${TDB_URL:?err TDB_URL must be set for external TerminusDB}
