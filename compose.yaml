# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Firnline — docker compose deployment
#
# Default (external TerminusDB — TDB_URL required):
#   1. cp .env.example .env && vim .env         # set TDB_URL + secrets
#   2. docker compose --profile bootstrap up bootstrap --abort-on-container-exit
#   3. docker compose up -d                      # captured + ingestd + queryd
#
# Self-contained (bundled TerminusDB):
#   1. Set TDB_URL=http://terminusdb:6363 in .env
#   2. docker compose -f compose.yaml -f compose.bundled-tdb.yaml \
#        --profile bootstrap up bootstrap --abort-on-container-exit
#   3. docker compose -f compose.yaml -f compose.bundled-tdb.yaml up -d
#
# Bootstrap profile (run once per setup):
#   docker compose --profile bootstrap run --rm bootstrap
#
# Extension toggling:
#   Set FIRNLINE_EXTENSIONS in .env.  The bootstrap service installs them into
#   the firnline_ext_venv volume.  All other services mount it read-only.
#   First-party wheels are baked into the images at build time.
#
# Requires Docker Compose >= 2.24.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

services:
  # ── Bootstrap (profiles: [bootstrap]) ───────────────────────────────────
  bootstrap:
    profiles:
      - bootstrap
    build:
      context: .
      dockerfile: packages/firnline-schema/Dockerfile
    image: firnline/firnline-schema:local
    environment:
      TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
      FIRNLINE_EXTENSIONS_PURGE: ${FIRNLINE_EXTENSIONS_PURGE:-false}
      FIRNLINE_SCHEMA_TDB_PASSWORD: ${TDB_PASSWORD:?}
      TDB_ORG: ${TDB_ORG:-admin}
      TDB_DB: ${TDB_DB:-firnline}
      TDB_USER: ${TDB_USER:-admin}
      TDB_BRANCH: ${TDB_BRANCH:-main}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv             # writeable — installs wheels here
      - ./schema:/work/schema:ro
      - ./build:/work/build
    restart: "no"
    # 1. Create the database if it does not exist (TerminusDB requires it
    #    before any schema push; uses a Python heredoc — no extra deps besides
    #    firnline-core (httpx) which is already installed in this image).
    # 2. Compose schema modules.
    # 3. Apply schema + migrations (creates branch if needed; idempotent).
    # 4. Validate the result.
    #
    # List form so compose passes argv directly (no parser shell-tokenization).
    # $$ escaping prevents compose from interpolating secrets into the command.
    command:
      - sh
      - -euc
      - |
        set -eu
        echo "=== Ensure database exists ==="
        python << PYEOF
        import asyncio, sys
        from firnline_core.tdb import TdbClient
        async def main():
            async with TdbClient(
                base_url="$${TDB_URL}",
                org="$${TDB_ORG:-admin}",
                db="$${TDB_DB:-firnline}",
                user="$${TDB_USER:-admin}",
                password="$${FIRNLINE_SCHEMA_TDB_PASSWORD}",
            ) as c:
                if await c.db_exists():
                    print("Database already exists.")
                else:
                    await c.create_db()
                    print("Database created.")
        asyncio.run(main())
        PYEOF
        echo "=== Compose schema ==="
        firnline-schema compose --modules-dir /work/schema/modules --out-dir /work/build
        echo "=== Apply schema ==="
        firnline-schema apply --modules-dir /work/schema/modules \
          --tdb-url $${TDB_URL} \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-firnline} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Validate ==="
        firnline-schema validate --modules-dir /work/schema/modules \
          --tdb-url $${TDB_URL} \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-firnline} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Bootstrap complete ==="

  # ── captured — ingestion API daemon ────────────────────────────────────
  captured:
    build:
      context: .
      dockerfile: services/captured/Dockerfile
    image: firnline/captured:local
    ports:
      - "${CAPTURED_HOST_PORT:-8088}:8088"
    environment:
      CAPTURED_TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      CAPTURED_TDB_ORG: ${TDB_ORG:-admin}
      CAPTURED_TDB_DB: ${TDB_DB:-firnline}
      CAPTURED_TDB_BRANCH: ${TDB_BRANCH:-main}
      CAPTURED_TDB_USER: ${TDB_USER:-admin}
      CAPTURED_TDB_PASSWORD: ${TDB_PASSWORD:?}
      CAPTURED_API_TOKEN: ${CAPTURED_API_TOKEN:?err CAPTURED_API_TOKEN must be set}
      FIRNLINE_BLOB_ROOT: /var/lib/firnline/blobs
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv:ro
      - blobs:/var/lib/firnline/blobs
    restart: unless-stopped
    healthcheck:
      # Healthz returns 200 (healthy) or 503 (degraded).
      # urllib.urlopen raises HTTPError on non-2xx → exit 1 = unhealthy.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz',timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── ingestd — polling worker ───────────────────────────────────────────
  ingestd:
    build:
      context: .
      dockerfile: services/ingestd/Dockerfile
    image: firnline/ingestd:local
    depends_on:
      indexed:
        condition: service_started
    environment:
      INGESTD_TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      INGESTD_TDB_ORG: ${TDB_ORG:-admin}
      INGESTD_TDB_DB: ${TDB_DB:-firnline}
      INGESTD_TDB_BRANCH: ${TDB_BRANCH:-main}
      INGESTD_TDB_USER: ${TDB_USER:-admin}
      INGESTD_TDB_PASSWORD: ${TDB_PASSWORD:?}
      INGESTD_LLM_BASE_URL: ${FIRNLINE_LLM_BASE_URL:?err FIRNLINE_LLM_BASE_URL must be set}
      INGESTD_LLM_API_KEY: ${FIRNLINE_LLM_API_KEY:-}
      INGESTD_LLM_MODEL: ${FIRNLINE_LLM_MODEL:-}
      INGESTD_POLL_INTERVAL_SECONDS: ${INGESTD_POLL_INTERVAL_SECONDS:-60}
      INGESTD_MAX_LLM_RETRIES: ${INGESTD_MAX_LLM_RETRIES:-3}
      INGESTD_DRY_RUN: ${INGESTD_DRY_RUN:-false}
      INGESTD_LIVENESS_FILE: ${INGESTD_LIVENESS_FILE:-/tmp/ingestd-alive}
      INGESTD_INDEXED_ENABLED: ${INGESTD_INDEXED_ENABLED:-false}
      INGESTD_INDEXED_URL: ${INDEXED_URL:-http://indexed:8089}
      INGESTD_INDEXED_TOKEN: ${INDEXED_API_TOKEN:-}
      INGESTD_INDEXED_MIN_CONFIDENCE: ${INGESTD_INDEXED_MIN_CONFIDENCE:-0.85}
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Liveness file touched on each successful cycle.  find exits 0 even
      # when it matches nothing, so pipe to grep -q . to fail on stale/absent.
      test:
        - CMD-SHELL
        - "find /tmp/ingestd-alive -mmin -5 2>/dev/null | grep -q ."
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── indexed — precision grounding service ───────────────────────────────
  indexed:
    build:
      context: .
      dockerfile: services/indexed/Dockerfile
    image: firnline/indexed:local
    ports:
      - "${INDEXED_HOST_PORT:-8089}:8089"
    environment:
      INDEXED_TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      INDEXED_TDB_ORG: ${TDB_ORG:-admin}
      INDEXED_TDB_DB: ${TDB_DB:-firnline}
      INDEXED_TDB_BRANCH: ${TDB_BRANCH:-main}
      INDEXED_TDB_USER: ${TDB_USER:-admin}
      INDEXED_TDB_PASSWORD: ${TDB_PASSWORD:?}
      INDEXED_LLM_BASE_URL: ${FIRNLINE_LLM_BASE_URL:?err FIRNLINE_LLM_BASE_URL must be set}
      INDEXED_LLM_API_KEY: ${FIRNLINE_LLM_API_KEY:-}
      INDEXED_EMBEDDING_MODEL: ${FIRNLINE_EMBEDDING_MODEL:-text-embedding-3-small}
      INDEXED_API_TOKEN: ${INDEXED_API_TOKEN:-}
      INDEXED_POLL_INTERVAL_SECONDS: ${INDEXED_POLL_INTERVAL_SECONDS:-60}
      INDEXED_DRY_RUN: ${INDEXED_DRY_RUN:-false}
      INDEXED_STRICT_PLUGINS: ${INDEXED_STRICT_PLUGINS:-false}
      INDEXED_MIN_CONFIDENCE: ${INDEXED_MIN_CONFIDENCE:-0.60}
      INDEXED_LIVENESS_FILE: ${INDEXED_LIVENESS_FILE:-/tmp/indexed-alive}
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv:ro
      - firnline_index:/var/lib/firnline/index
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8089/healthz',timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 150s

  # ── triggerd — trigger evaluation daemon ────────────────────────────────
  triggerd:
    build:
      context: .
      dockerfile: services/triggerd/Dockerfile
    image: firnline/triggerd:local
    environment:
      TRIGGERD_TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      TRIGGERD_TDB_ORG: ${TDB_ORG:-admin}
      TRIGGERD_TDB_DB: ${TDB_DB:-firnline}
      TRIGGERD_TDB_BRANCH: ${TDB_BRANCH:-main}
      TRIGGERD_TDB_USER: ${TDB_USER:-admin}
      TRIGGERD_TDB_PASSWORD: ${TDB_PASSWORD:?}
      TRIGGERD_POLL_INTERVAL_SECONDS: ${TRIGGERD_POLL_INTERVAL_SECONDS:-60}
      TRIGGERD_LOOKBACK_SECONDS: ${TRIGGERD_LOOKBACK_SECONDS:-900}
      TRIGGERD_DEFAULT_TIMEZONE: ${TRIGGERD_DEFAULT_TIMEZONE:-Europe/Zurich}
      TRIGGERD_DRY_RUN: ${TRIGGERD_DRY_RUN:-false}
      TRIGGERD_STRICT_PLUGINS: ${TRIGGERD_STRICT_PLUGINS:-false}
      TRIGGERD_LIVENESS_FILE: ${TRIGGERD_LIVENESS_FILE:-/tmp/triggerd-alive}
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Liveness file touched on each successful cycle.  find exits 0 even
      # when it matches nothing, so pipe to grep -q . to fail on stale/absent.
      test:
        - CMD-SHELL
        - "find /tmp/triggerd-alive -mmin -5 2>/dev/null | grep -q ."
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── queryd — conversational agent API ──────────────────────────────────
  queryd:
    build:
      context: .
      dockerfile: services/queryd/Dockerfile
    image: firnline/queryd:local
    depends_on:
      indexed:
        condition: service_started
    ports:
      - "${QUERYD_HOST_PORT:-8087}:8087"
    environment:
      QUERYD_TDB_URL: ${TDB_URL:?err TDB_URL must be set (e.g. in .env)}
      QUERYD_TDB_ORG: ${TDB_ORG:-admin}
      QUERYD_TDB_DB: ${TDB_DB:-firnline}
      QUERYD_TDB_BRANCH: ${TDB_BRANCH:-main}
      QUERYD_TDB_USER: ${TDB_USER:-admin}
      QUERYD_TDB_PASSWORD: ${TDB_PASSWORD:?}
      QUERYD_API_TOKEN: ${QUERYD_API_TOKEN:?err QUERYD_API_TOKEN must be set}
      QUERYD_LLM_BASE_URL: ${FIRNLINE_LLM_BASE_URL:?err FIRNLINE_LLM_BASE_URL must be set}
      QUERYD_LLM_API_KEY: ${FIRNLINE_LLM_API_KEY:-}
      QUERYD_LLM_MODEL: ${FIRNLINE_LLM_MODEL:-}
      QUERYD_ENABLE_WRITES: ${QUERYD_ENABLE_WRITES:-false}
      QUERYD_INDEXED_ENABLED: ${QUERYD_INDEXED_ENABLED:-false}
      QUERYD_INDEXED_URL: ${INDEXED_URL:-http://indexed:8089}
      QUERYD_INDEXED_TOKEN: ${INDEXED_API_TOKEN:-}
      QUERYD_INDEXED_MIN_CONFIDENCE: ${QUERYD_INDEXED_MIN_CONFIDENCE:-0.60}
      FIRNLINE_EXTENSIONS: ${FIRNLINE_EXTENSIONS:-}
    volumes:
      - firnline_ext_venv:/opt/firnline-ext-venv:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8087/healthz',timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── webui — Reflex-based web UI ───────────────────────────────────────────
  webui:
    build:
      context: .
      dockerfile: services/webui/Dockerfile
    image: firnline/webui:local
    depends_on:
      captured:
        condition: service_started
      queryd:
        condition: service_started
    ports:
      - "${WEBUI_HOST_PORT:-3000}:3000"
    environment:
      WEBUI_CAPTURED_URL: http://captured:8088
      WEBUI_CAPTURED_API_TOKEN: ${CAPTURED_API_TOKEN:?}
      WEBUI_QUERYD_URL: http://queryd:8087
      WEBUI_QUERYD_API_TOKEN: ${QUERYD_API_TOKEN:?}
      WEBUI_INDEXED_URL: http://indexed:8089
      WEBUI_TDB_URL: ${TDB_URL:?err TDB_URL must be set}
      WEBUI_TDB_ORG: ${TDB_ORG:-admin}
      WEBUI_TDB_DB: ${TDB_DB:-firnline}
      WEBUI_TDB_BRANCH: ${TDB_BRANCH:-main}
      WEBUI_TDB_USER: ${TDB_USER:-admin}
      WEBUI_TDB_PASSWORD: ${TDB_PASSWORD:?}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-}
      REFLEX_API_URL: ${WEBUI_API_URL:-}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz',timeout=5)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  firnline_ext_venv:
  firnline_index:
  blobs:
