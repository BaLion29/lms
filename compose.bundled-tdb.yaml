# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Bundled TerminusDB overlay — pass alongside compose.yaml.
#
# Usage:
#   1. Set TDB_URL=http://terminusdb:6363 in .env
#   2. docker compose -f compose.yaml -f compose.bundled-tdb.yaml \
#        --profile bootstrap up bootstrap --abort-on-container-exit
#   3. docker compose -f compose.yaml -f compose.bundled-tdb.yaml up -d
#
# Requires Docker Compose >= 2.24 for !override tag support.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

services:
  # ── TerminusDB (SSOT database) ──────────────────────────────────────────
  terminusdb:
    image: terminusdb/terminusdb-server:v12.0.6
    environment:
      TERMINUSDB_ADMIN_PASS: ${TDB_PASSWORD:?err TDB_PASSWORD must be set (e.g. in .env)}
    volumes:
      - terminusdb_data:/app/terminusdb/storage
    ports:
      - "${TDB_HOST_PORT:-6363}:6363"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6363'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ── Bootstrap (add terminusdb dependency; hardcode TDB URL) ─────────────
  bootstrap:
    depends_on:
      terminusdb:
        condition: service_healthy
    # Override the bootstrap command to use the bundled terminusdb.
    # The base command uses $$ escaping to defer to a TDB_URL env var;
    # we hardcode the containerised URL here for reliability.
    command:
      - sh
      - -euc
      - |
        set -eu
        echo "=== Ensure database exists ==="
        python << "PYEOF"
        import asyncio, sys
        from firnline_core.tdb import TdbClient
        async def main():
            async with TdbClient(
                base_url="http://terminusdb:6363",
                org="$${TDB_ORG:-admin}",
                db="$${TDB_DB:-firnline}",
                user="$${TDB_USER:-admin}",
                password="$${FIRNLINE_SCHEMA_TDB_PASSWORD}",
                author="service:ingestd",
            ) as c:
                if await c.db_exists():
                    print("Database already exists.")
                else:
                    await c.create_db()
                    print("Database created.")
        asyncio.run(main())
        PYEOF
        echo "=== Compose schema ==="
        firnline-schema compose --modules-dir /work/schema/modules --out-dir /work/build
        echo "=== Apply schema ==="
        firnline-schema apply --modules-dir /work/schema/modules \
          --tdb-url http://terminusdb:6363 \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-firnline} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Validate ==="
        firnline-schema validate --modules-dir /work/schema/modules \
          --tdb-url http://terminusdb:6363 \
          --tdb-org $${TDB_ORG:-admin} \
          --tdb-db $${TDB_DB:-firnline} \
          --tdb-user $${TDB_USER:-admin} \
          --branch $${TDB_BRANCH:-main}
        echo "=== Bootstrap complete ==="

  # ── captured (add terminusdb dependency) ────────────────────────────────
  captured:
    depends_on:
      terminusdb:
        condition: service_healthy

  # ── ingestd (add terminusdb dependency) ─────────────────────────────────
  ingestd:
    depends_on:
      terminusdb:
        condition: service_healthy

  # ── queryd (add terminusdb dependency) ──────────────────────────────────
  queryd:
    depends_on:
      terminusdb:
        condition: service_healthy

  # ── indexed (add terminusdb dependency) ─────────────────────────────────
  indexed:
    depends_on:
      terminusdb:
        condition: service_healthy

volumes:
  terminusdb_data:
